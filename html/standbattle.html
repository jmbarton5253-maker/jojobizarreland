<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stand Battle - JoJo Fun Land</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #0a0018;
            font-family: 'Courier New', Courier, monospace;
        }
        body { display: flex; flex-direction: column; }

        /* ── Header ── */
        .head {
            flex-shrink: 0;
            height: 55px;
            background: lightcoral;
            border-bottom: 3px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1001;
        }
        .head h1 {
            font-size: 22px;
            font-weight: bold;
            color: rgb(167, 25, 219);
            text-shadow: 2px 2px 0 #000;
        }

        /* ── Home button ── */
        .home-btn {
            position: fixed;
            top: 10px; left: 10px;
            z-index: 1002;
            font-size: 14px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            background: lightcoral;
            border: 3px solid #000;
            box-shadow: 3px 3px 0 #000;
            cursor: pointer;
            padding: 5px 12px;
            text-decoration: none;
            color: #000;
        }
        .home-btn:hover { background: rgb(0, 183, 255); }

        /* ── Game area ── */
        .game-wrap {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px 8px 6px;
        }

        /* ── Battle frame: constrained to 60% width, centered ── */
        .battle-frame {
            width: 60%;
            min-width: 320px;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        /* ── Canvas wrapper (fills remaining space) ── */
        .canvas-wrapper {
            flex: 1;
            min-height: 0;
            position: relative;
            border: 5px solid #000;
            box-shadow: 6px 6px 0 #000;
        }
        #battleCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* ── Result overlay (over canvas) ── */
        .result-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.78);
            z-index: 20;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .result-overlay.show { display: flex; }
        .result-main {
            font-size: clamp(22px, 5vw, 38px);
            font-weight: bold;
            text-shadow: 4px 4px 0 #000;
            text-align: center;
            padding: 6px 16px;
        }
        .result-sub {
            font-size: clamp(12px, 2vw, 16px);
            color: lightcoral;
            text-shadow: 2px 2px 0 #000;
            margin-top: 8px;
            text-align: center;
            padding: 0 16px;
        }
        .restart-btn {
            margin-top: 18px;
            background: lightcoral;
            border: 4px solid #000;
            padding: 8px 22px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
            color: #000;
        }
        .restart-btn:hover { background: rgb(0, 183, 255); }

        /* ── Battle UI bar (text + moves) ── */
        .battle-ui {
            flex-shrink: 0;
            height: 115px;
            display: grid;
            grid-template-columns: 55% 45%;
            background: #100028;
            border: 5px solid #7733cc;
            border-top: 0;
            box-shadow: 6px 6px 0 #000;
        }
        #battleText {
            border-right: 4px solid #7733cc;
            padding: 10px 12px;
            font-size: clamp(11px, 1.4vw, 15px);
            font-weight: bold;
            color: #e0ccff;
            line-height: 1.55;
        }
        .move-menu {
            padding: 6px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            align-content: center;
        }
        .move-btn {
            background: transparent;
            border: 3px solid #aa44ff;
            padding: 5px 4px;
            font-family: 'Courier New', monospace;
            font-size: clamp(9px, 1.1vw, 12px);
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            color: #e0ccff;
            box-shadow: 2px 2px 0 #000;
            text-transform: uppercase;
            line-height: 1.2;
        }
        .move-btn:hover:not(:disabled) { background: #3d0077; color: #ffdd88; }
        .move-btn:disabled { opacity: 0.35; cursor: default; }
        .move-type { font-size: 8px; color: #aa77ff; display: block; font-weight: normal; }
    </style>
</head>
<body>
<a href="scratch.html" class="home-btn">&#8592; Home</a>

<div class="head">
    <h1>&#9733; STAND BATTLE &#9733;</h1>
</div>

<div class="game-wrap">
<div class="battle-frame">
    <div class="canvas-wrapper">
        <canvas id="battleCanvas"></canvas>
        <div class="result-overlay" id="resultOverlay">
            <div class="result-main" id="resultMain"></div>
            <div class="result-sub"  id="resultSub"></div>
            <button class="restart-btn" onclick="initGame()">Play Again</button>
        </div>
    </div>
    <div class="battle-ui">
        <div id="battleText">What will<br>STAR PLATINUM do?</div>
        <div class="move-menu" id="moveMenu"></div>
    </div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════
//  CANVAS + RESIZE
// ═══════════════════════════════════════════════
const canvas = document.getElementById('battleCanvas');
const ctx    = canvas.getContext('2d');

let W, H, B, groundY, spBase, twBase;

function resizeCanvas() {
    const wrap = document.querySelector('.canvas-wrapper');
    W = wrap.offsetWidth;
    H = wrap.offsetHeight;
    canvas.width  = W;
    canvas.height = H;
    ctx.imageSmoothingEnabled = false;
    B = Math.max(2, Math.floor(H / 52));
    groundY = Math.floor(H * 0.92);
    const sh = B * 42; // sprite height in px
    spBase = { x: Math.floor(W * 0.06),              y: groundY - sh };      // lower-left
    twBase = { x: Math.floor(W * 0.94) - B * 20,     y: Math.floor(H * 0.04) }; // upper-right
    drawFrame();
}
window.addEventListener('resize', resizeCanvas);

// ═══════════════════════════════════════════════
//  GAME DATA
// ═══════════════════════════════════════════════
const MAX_HP = 150;

const playerMoves = [
    { name: "ORA Barrage",    type: "Physical", min: 12, max: 22, acc: 1.00, heal: 0 },
    { name: "Prcsn Strike",   type: "Physical", min: 22, max: 38, acc: 1.00, heal: 0 },
    { name: "Star Finger",    type: "Special",  min: 35, max: 55, acc: 0.72, heal: 0 },
    { name: "Stand Resolve",  type: "Defense",  min:  0, max:  0, acc: 1.00, heal: 28 },
];
const enemyMoves = [
    { name: "ZA WARUDO",      type: "Special",  min: 25, max: 42, acc: 1.00, heal: 0 },
    { name: "Knife Volley",   type: "Physical", min: 14, max: 26, acc: 1.00, heal: 0 },
    { name: "Vampire Regen",  type: "Defense",  min:  0, max:  0, acc: 1.00, heal: 22 },
    { name: "ROAD ROLLER DA", type: "Special",  min: 40, max: 62, acc: 0.55, heal: 0 },
];

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
let playerHp, enemyHp, busy;

// Animation state
let spDx = 0, spDy = 0, twDx = 0, twDy = 0;
let spArmExtend = 0, twArmExtend = 0;
let spFlashing = false, twFlashing = false;
let particles = [];

// ═══════════════════════════════════════════════
//  SPRITE DRAWING
// ═══════════════════════════════════════════════

// Star Platinum STAND — 20w × 42h, back-right view (faces right toward TW)
function drawSP(x, y, armExtend) {
    const K='#000000',
          P='#8833cc', PL='#bb55ff', PD='#551188', PX='#2d005a',
          G='#ddaa11', GL='#ffee55', GD='#886600',
          R='#cc1100', RL='#ff3311',
          W='#e0e0e0', WG='#aaaaaa',
          HD='#333333';
    const r=(c,rw,w,h,col)=>{ctx.fillStyle=col;ctx.fillRect(x+c*B,y+rw*B,w*B,h*B);};

    // ── WILD BLACK HAIR (rows 0–7) ──
    r(4, 0, 6, 1, K);
    r(3, 1, 9, 1, K);
    r(2, 2,11, 1, K);
    r(3, 3, 9, 1, K);
    r(4, 4, 7, 1, K);
    r(5, 5, 5, 1, K);
    r(5, 6, 5, 1, K);
    r(6, 7, 4, 1, K);
    // Swept-back spikes (goes right)
    r(10, 1, 6, 1, K); r(13, 2, 5, 1, K); r(15, 3, 4, 1, K); r(17, 4, 2, 1, K);
    // Inner hair shading
    r(5, 2, 6, 2, HD); r(5, 4, 5, 2, HD);

    // ── HEAD / BACK OF HEAD (rows 5–11) ── dark purple
    r(5, 5,10, 7, PD);
    r(5, 5, 1, 7, K); r(14, 5, 1, 7, K);
    r(5, 5,10, 1, K); r(5,11,10, 1, K);
    // Silver headband stripe (row 6)
    r(5, 6,10, 1, '#b8b8b8');
    r(6, 6, 4, 1, '#e0e0e0'); // headband highlight
    r(5, 6, 1, 1, K); r(14, 6, 1, 1, K);
    // Side-of-face shading
    r(6, 7, 3, 4, PX); // dark ear-side zone
    r(12, 7, 2, 4, P); // lighter zone near cheek

    // ── NECK (rows 11–12) ──
    r(7,11, 5, 2, PD);
    r(7,11, 1, 2, K); r(11,11, 1, 2, K);

    // ── RED SCARF (rows 12–15) ── billows forward/right
    r(6,12, 8, 4, R);
    r(6,12, 1, 4, K); r(13,12, 1, 4, K); r(6,12, 8, 1, K);
    r(7,13, 3, 1, RL); // highlight stripe
    r(13,13, 5, 2, R); r(17,14, 3, 1, R); // tail extends right

    // ── GOLD SHOULDER PADS (rows 12–17) ── wide, prominent
    // Left pad
    r(0,12, 6, 6, G);
    r(0,12, 1, 6, K); r(5,12, 1, 6, K); r(0,12, 6, 1, K); r(0,17, 6, 1, K);
    r(1,13, 3, 2, GL); r(2,15, 1, 1, GD); r(3,15, 2, 1, GD);
    // Right pad
    r(14,12, 6, 6, G);
    r(14,12, 1, 6, K); r(19,12, 1, 6, K); r(14,12, 6, 1, K); r(14,17, 6, 1, K);
    r(15,13, 3, 2, GL); r(16,15, 1, 1, GD); r(17,15, 2, 1, GD);

    // ── UPPER ARMS (rows 17–24) ──
    // Left (hanging)
    r(0,17, 5, 8, P);
    r(0,17, 1, 8, K); r(4,17, 1, 8, K);
    r(1,18, 2, 6, PL); r(3,18, 1, 6, PD);
    // Right (punching arm — same position, extension handled below)
    r(15,17, 5, 8, P);
    r(15,17, 1, 8, K); r(19,17, 1, 8, K);
    r(17,18, 2, 6, PL); r(15,18, 1, 6, PD);

    // ── BACK TORSO (rows 17–25) ── muscular purple back
    r(4,17,12, 8, P);
    r(4,17, 1, 8, K); r(15,17, 1, 8, K); r(4,25,12, 1, K);
    r(5,17, 2, 8, PL);  // left lat highlight
    r(13,17, 2, 8, PL); // right lat highlight
    r(7,17, 6, 8, PD);  // center back darker
    r(9,18, 2, 6, P);   // spine channel
    r(9,19, 2, 1, PL); r(9,22, 2, 1, PL); // spine highlights
    r(5,22, 8, 3, PX);  // lower back deep shadow

    // ── FOREARMS (rows 24–29) ──
    // Left forearm (hanging)
    r(0,24, 5, 6, P); r(0,24, 1, 6, K); r(4,24, 1, 6, K);
    r(1,25, 2, 4, PL);
    // Right forearm
    r(15,24, 5, 6, P); r(15,24, 1, 6, K); r(19,24, 1, 6, K);
    r(17,25, 2, 4, PL);

    // ── BLACK GLOVES + GOLD CUFFS ──
    // Left glove (rows 29–32)
    r(0,29, 5, 1, G); r(0,29, 1, 1, K); r(4,29, 1, 1, K); // cuff
    r(1,30, 4, 3, K); r(2,31, 2, 1, HD);
    // Right glove + arm extension
    const ae = Math.round(armExtend * 9);
    r(15,29, 5, 1, G); r(15,29, 1, 1, K); r(19,29, 1, 1, K); // cuff
    // Extending forearm segment
    if (ae > 0) { r(19,30, ae, 4, P); r(19,30, 1, 4, K); r(18+ae,30, 1, 4, K); }
    // Fist
    r(19+ae,30, 5, 4, K); r(20+ae,31, 3, 2, HD);

    // ── GOLD BELT (rows 25–27) ──
    r(4,25,12, 3, G);
    r(4,25, 1, 3, K); r(15,25, 1, 3, K);
    r(5,25,10, 1, GL); r(4,27,12, 1, GD);
    // Round buckle
    r(9,25, 2, 3, GL); r(9,25, 1, 3, K); r(10,25, 1, 3, K);
    r(9,25, 2, 1, K); r(9,27, 2, 1, K);

    // ── WHITE CLOTH SKIRT (rows 27–36) ──
    r(6,27, 8,10, W);
    r(6,27, 1,10, WG); r(13,27, 1,10, WG);
    r(6,27, 8, 1, K);
    r(7,30, 2, 7, WG); r(11,30, 2, 7, WG); r(9,32, 2, 5, WG);

    // ── HIPS (rows 27–31) ──
    r(4,27, 3, 5, PD); r(4,27, 1, 5, K); r(6,27, 1, 5, K);
    r(14,27, 2, 5, PD); r(14,27, 1, 5, K); r(15,27, 1, 5, K);

    // ── THIGHS (rows 32–38) ── spread in wide fighting stance
    r(2,32, 6, 6, P); r(2,32, 1, 6, K); r(7,32, 1, 6, K);
    r(3,33, 2, 4, PL); r(6,33, 1, 4, PD);
    r(12,32, 6, 6, P); r(12,32, 1, 6, K); r(17,32, 1, 6, K);
    r(13,33, 2, 4, PL); r(16,33, 1, 4, PD);

    // ── GOLD KNEE PADS (rows 38–40) ──
    r(2,38, 6, 3, G); r(2,38, 1, 3, K); r(7,38, 1, 3, K);
    r(2,38, 6, 1, K); r(2,40, 6, 1, K); r(3,38, 3, 1, GL);
    r(12,38, 6, 3, G); r(12,38, 1, 3, K); r(17,38, 1, 3, K);
    r(12,38, 6, 1, K); r(12,40, 6, 1, K); r(13,38, 3, 1, GL);

    // ── CALVES (rows 40–41) ──
    r(3,40, 4, 2, PD); r(3,40, 1, 2, K); r(6,40, 1, 2, K); r(4,41, 1, 1, P);
    r(13,40, 4, 2, PD); r(13,40, 1, 2, K); r(16,40, 1, 2, K); r(14,41, 1, 1, P);

    // ── BLACK BOOTS (rows 41+) ── (drawn as last row + one extra below)
    r(2,41, 6, 1, K); r(12,41, 6, 1, K);
}

// The World STAND — 20w × 42h, mirrored (faces left toward SP)
function drawTW(x, y, armExtend) {
    ctx.save();
    ctx.translate(x + 20 * B, y);
    ctx.scale(-1, 1);

    const K='#000000',
          C='#ccaa55',  CL='#eedd88', CD='#886633', CX='#4a3010',
          S='#aaaaaa',  SL='#dddddd', SD='#666666',
          G='#ddaa11',  GL='#ffee55', GD='#886600',
          W='#e8e8e8',  WG='#aaaaaa',
          HI='#eeeeee', // white hair
          EY='#ffcc00', // yellow eyes
          PU='#771199'; // purple cross accent
    const r=(c,rw,w,h,col)=>{ctx.fillStyle=col;ctx.fillRect(c*B,rw*B,w*B,h*B);};

    // ── WHITE/SILVER FLOWING HAIR (rows 0–7) ──
    r(4, 0, 6, 1, HI);
    r(3, 1, 9, 1, HI);
    r(2, 2,11, 1, HI);
    r(3, 3, 9, 1, HI);
    r(4, 4, 7, 1, HI);
    r(5, 5, 5, 1, HI);
    r(5, 6, 5, 1, HI);
    r(6, 7, 4, 1, HI);
    // Swept spikes
    r(10, 1, 6, 1, HI); r(13, 2, 5, 1, HI); r(15, 3, 4, 1, HI); r(17, 4, 2, 1, HI);
    // Inner shading (grey)
    r(5, 2, 6, 2, WG); r(5, 4, 5, 2, WG);
    // Black outlines
    r(4, 0, 1, 8, K); r(14, 0, 1, 8, K);

    // ── HEAD (rows 5–11) ── cream/tan
    r(5, 5,10, 7, C);
    r(5, 5, 1, 7, K); r(14, 5, 1, 7, K);
    r(5, 5,10, 1, K); r(5,11,10, 1, K);
    // Gold headband stripe (row 6)
    r(5, 6,10, 1, G);
    r(6, 6, 4, 1, GL); r(5, 6, 1, 1, K); r(14, 6, 1, 1, K);
    // Face shading — visible eye side (front view after mirror)
    r(12, 7, 2, 3, CX); r(6, 7, 2, 3, CD);
    // Yellow eye (row 8, mirrored = left eye)
    r(11, 8, 2, 1, EY); r(11, 8, 1, 1, K);
    // Smirk
    r(8, 9, 3, 1, CD);

    // ── NECK (rows 11–12) ──
    r(7,11, 5, 2, C);
    r(7,11, 1, 2, K); r(11,11, 1, 2, K);

    // ── PURPLE CROSS SCARF (rows 12–15) ──
    r(6,12, 8, 4, PU);
    r(6,12, 1, 4, K); r(13,12, 1, 4, K); r(6,12, 8, 1, K);
    r(7,13, 3, 1, '#aa44cc'); // scarf highlight
    r(13,13, 5, 2, PU); r(17,14, 3, 1, PU); // tail

    // ── SILVER SHOULDER PADS (rows 12–17) ──
    r(0,12, 6, 6, S);
    r(0,12, 1, 6, K); r(5,12, 1, 6, K); r(0,12, 6, 1, K); r(0,17, 6, 1, K);
    r(1,13, 3, 2, SL); r(2,15, 1, 1, SD); r(3,15, 2, 1, SD);
    r(14,12, 6, 6, S);
    r(14,12, 1, 6, K); r(19,12, 1, 6, K); r(14,12, 6, 1, K); r(14,17, 6, 1, K);
    r(15,13, 3, 2, SL); r(16,15, 1, 1, SD); r(17,15, 2, 1, SD);

    // ── UPPER ARMS (rows 17–24) ──
    r(0,17, 5, 8, C); r(0,17, 1, 8, K); r(4,17, 1, 8, K);
    r(1,18, 2, 6, CL); r(3,18, 1, 6, CD);
    r(15,17, 5, 8, C); r(15,17, 1, 8, K); r(19,17, 1, 8, K);
    r(17,18, 2, 6, CL); r(15,18, 1, 6, CD);

    // ── TORSO (rows 17–25) ── cream with purple cross
    r(4,17,12, 8, C);
    r(4,17, 1, 8, K); r(15,17, 1, 8, K); r(4,25,12, 1, K);
    r(5,17, 2, 8, CL);  // left highlight
    r(13,17, 2, 8, CL); // right highlight
    r(7,17, 6, 8, CD);  // center darker
    // Purple cross on torso
    r(9,17, 2, 8, PU);  // vertical bar
    r(6,21, 8, 2, PU);  // horizontal bar
    r(9,18, 2, 1, '#aa44cc'); r(6,21, 8, 1, '#aa44cc'); // cross highlight
    r(5,22, 8, 3, CX);  // lower torso shadow

    // ── FOREARMS (rows 24–29) ──
    r(0,24, 5, 6, C); r(0,24, 1, 6, K); r(4,24, 1, 6, K); r(1,25, 2, 4, CL);
    r(15,24, 5, 6, C); r(15,24, 1, 6, K); r(19,24, 1, 6, K); r(17,25, 2, 4, CL);

    // ── BLACK GLOVES + GOLD CUFFS ──
    r(0,29, 5, 1, G); r(0,29, 1, 1, K); r(4,29, 1, 1, K);
    r(1,30, 4, 3, K); r(2,31, 2, 1, '#333');
    const ae = Math.round(armExtend * 9);
    r(15,29, 5, 1, G); r(15,29, 1, 1, K); r(19,29, 1, 1, K);
    if (ae > 0) { r(19,30, ae, 4, C); r(19,30, 1, 4, K); r(18+ae,30, 1, 4, K); }
    r(19+ae,30, 5, 4, K); r(20+ae,31, 3, 2, '#333');

    // ── GOLD BELT (rows 25–27) ──
    r(4,25,12, 3, G); r(4,25, 1, 3, K); r(15,25, 1, 3, K);
    r(5,25,10, 1, GL); r(4,27,12, 1, GD);
    r(9,25, 2, 3, GL); r(9,25, 1, 3, K); r(10,25, 1, 3, K);
    r(9,25, 2, 1, K); r(9,27, 2, 1, K);

    // ── WHITE CLOTH SKIRT (rows 27–36) ──
    r(6,27, 8,10, W);
    r(6,27, 1,10, WG); r(13,27, 1,10, WG); r(6,27, 8, 1, K);
    r(7,30, 2, 7, WG); r(11,30, 2, 7, WG); r(9,32, 2, 5, WG);

    // ── HIPS ──
    r(4,27, 3, 5, CD); r(4,27, 1, 5, K); r(6,27, 1, 5, K);
    r(14,27, 2, 5, CD); r(14,27, 1, 5, K); r(15,27, 1, 5, K);

    // ── THIGHS (rows 32–38) ──
    r(2,32, 6, 6, C); r(2,32, 1, 6, K); r(7,32, 1, 6, K);
    r(3,33, 2, 4, CL); r(6,33, 1, 4, CD);
    r(12,32, 6, 6, C); r(12,32, 1, 6, K); r(17,32, 1, 6, K);
    r(13,33, 2, 4, CL); r(16,33, 1, 4, CD);

    // ── SILVER KNEE PADS (rows 38–40) ──
    r(2,38, 6, 3, S); r(2,38, 1, 3, K); r(7,38, 1, 3, K);
    r(2,38, 6, 1, K); r(2,40, 6, 1, K); r(3,38, 3, 1, SL);
    r(12,38, 6, 3, S); r(12,38, 1, 3, K); r(17,38, 1, 3, K);
    r(12,38, 6, 1, K); r(12,40, 6, 1, K); r(13,38, 3, 1, SL);

    // ── CALVES (rows 40–41) ──
    r(3,40, 4, 2, CD); r(3,40, 1, 2, K); r(6,40, 1, 2, K); r(4,41, 1, 1, C);
    r(13,40, 4, 2, CD); r(13,40, 1, 2, K); r(16,40, 1, 2, K); r(14,41, 1, 1, C);

    // ── BLACK BOOTS (row 41) ──
    r(2,41, 6, 1, K); r(12,41, 6, 1, K);

    ctx.restore();
}


// ═══════════════════════════════════════════════
//  BACKGROUND
// ═══════════════════════════════════════════════
function drawBackground() {
    // ── Deep JoJo purple base gradient ──
    const base = ctx.createLinearGradient(0, 0, W, H);
    base.addColorStop(0,   '#07001a');
    base.addColorStop(0.35,'#1a0040');
    base.addColorStop(0.65,'#2a0055');
    base.addColorStop(1,   '#07001a');
    ctx.fillStyle = base;
    ctx.fillRect(0, 0, W, H);

    // ── Radial speed lines bursting from battle center ──
    const ox = W * 0.5, oy = H * 0.48;
    const reach = Math.hypot(W, H);
    ctx.save();
    for (let i = 0; i < 56; i++) {
        const a = (i / 56) * Math.PI * 2;
        const thick = i % 7 === 0 ? 2.5 : i % 3 === 0 ? 1.2 : 0.5;
        const alpha = i % 7 === 0 ? 0.22 : i % 3 === 0 ? 0.13 : 0.07;
        ctx.strokeStyle = `rgba(170, 60, 255, ${alpha})`;
        ctx.lineWidth = thick;
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(ox + Math.cos(a) * reach, oy + Math.sin(a) * reach);
        ctx.stroke();
    }
    ctx.restore();

    // ── Soft purple glow at center ──
    const glow = ctx.createRadialGradient(ox, oy, 0, ox, oy, H * 0.65);
    glow.addColorStop(0,   'rgba(130, 30, 220, 0.30)');
    glow.addColorStop(0.5, 'rgba(80,  0, 160, 0.12)');
    glow.addColorStop(1,   'rgba(0,   0,   0, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    // ── Stars ──
    ctx.save();
    [[.05,.08],[.17,.04],[.28,.13],[.43,.03],[.58,.10],[.72,.06],[.89,.11],
     [.11,.22],[.35,.19],[.62,.24],[.84,.18],[.03,.42],[.96,.38],
     [.20,.52],[.48,.56],[.75,.50],[.92,.58],[.14,.68],[.40,.74],[.70,.70]
    ].forEach(([px, py]) => {
        const a = 0.30 + Math.abs(Math.sin(px * 31.7 + py * 17.3)) * 0.50;
        const sz = 0.8 + Math.abs(Math.sin(py * 23.1)) * 1.4;
        ctx.fillStyle = `rgba(210, 185, 255, ${a})`;
        ctx.fillRect(W*px - sz/2, H*py - sz/2, sz, sz);
        // Occasional cross-sparkle on brighter stars
        if (a > 0.65) {
            ctx.fillStyle = `rgba(255, 240, 255, ${a * 0.6})`;
            ctx.fillRect(W*px - sz * 1.5, H*py - sz * 0.3, sz * 3, sz * 0.5);
            ctx.fillRect(W*px - sz * 0.3, H*py - sz * 1.5, sz * 0.5, sz * 3);
        }
    });
    ctx.restore();

    // ── ゴゴゴゴ menacing kanji (diagonal, JoJo manga style) ──
    ctx.save();
    const goSz = Math.max(12, B * 3.2);
    ctx.font = `bold ${goSz}px serif`;
    [
        [.05,.07],[.19,.03],[.37,.09],[.54,.04],[.71,.08],[.88,.05],
        [.11,.28],[.29,.24],[.49,.30],[.67,.26],[.86,.33],
        [.04,.50],[.23,.54],[.44,.48],[.66,.53],[.85,.49],
        [.13,.72],[.36,.77],[.60,.71],[.81,.75],
    ].forEach(([px, py], i) => {
        const alpha = 0.09 + (i % 5) * 0.04;
        ctx.save();
        ctx.translate(W * px, H * py);
        ctx.rotate(-0.42);
        ctx.fillStyle = `rgba(210, 90, 255, ${alpha})`;
        ctx.fillText('ゴ', 0, 0);
        ctx.restore();
    });
    ctx.restore();

    // ── Vignette: dark frame around edges ──
    const vig = ctx.createRadialGradient(W/2, H/2, H * 0.22, W/2, H/2, H * 0.88);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.65)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);
}

// ═══════════════════════════════════════════════
//  HP CARDS  (drawn on canvas)
// ═══════════════════════════════════════════════
function drawHpCard(cx, cy, who) {
    const hp  = who === 'player' ? playerHp : enemyHp;
    const pct = Math.max(0, hp / MAX_HP);
    const trainer = who === 'player' ? 'JOTARO'       : 'Foe: DIO';
    const stand   = who === 'player' ? 'STAR PLATINUM' : 'THE WORLD';

    const cW = Math.floor(B * 22);
    const cH = Math.floor(B * 7.5);
    const bdr = Math.max(2, Math.floor(B * 0.35));

    // Shadow
    ctx.fillStyle = '#000';
    ctx.fillRect(cx + 3, cy + 3, cW, cH);
    // Card body: dark purple
    ctx.fillStyle = '#160030';
    ctx.fillRect(cx, cy, cW, cH);
    // Purple border
    ctx.strokeStyle = '#aa44ff';
    ctx.lineWidth = bdr;
    ctx.strokeRect(cx + bdr * 0.5, cy + bdr * 0.5, cW - bdr, cH - bdr);

    const fs1 = Math.max(9,  Math.floor(B * 1.1));
    const fs2 = Math.max(10, Math.floor(B * 1.45));
    const pad = B * 0.6;

    ctx.textAlign = 'left';
    ctx.fillStyle = '#aa77ff';
    ctx.font = `${fs1}px 'Courier New', monospace`;
    ctx.fillText(trainer, cx + pad, cy + B * 1.6);

    ctx.fillStyle = '#e8d8ff';
    ctx.font = `bold ${fs2}px 'Courier New', monospace`;
    ctx.fillText(stand, cx + pad, cy + B * 3.2);

    ctx.font = `bold ${fs1}px 'Courier New', monospace`;
    ctx.fillStyle = '#cc99ff';
    ctx.fillText('HP', cx + pad, cy + B * 4.7);

    const barX = cx + B * 3.0;
    const barY = cy + B * 3.9;
    const barW = cW - B * 3.6;
    const barH = Math.max(6, Math.floor(B * 1.1));

    ctx.fillStyle = '#777';
    ctx.fillRect(barX, barY, barW, barH);

    const fc = pct > 0.5 ? '#00cc00' : pct > 0.25 ? '#ffcc00' : '#ee2200';
    ctx.fillStyle = fc;
    ctx.fillRect(barX + 1, barY + 1, Math.max(0, (barW - 2) * pct), Math.max(0, barH - 2));

    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);

    ctx.fillStyle = '#cc99ff';
    ctx.font = `${Math.max(8, Math.floor(B * 0.95))}px 'Courier New', monospace`;
    ctx.textAlign = 'right';
    ctx.fillText(Math.max(0, hp) + '/' + MAX_HP, cx + cW - B * 0.4, cy + cH - B * 0.5);
    ctx.textAlign = 'left';
}

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
function spawnParticles(cx, cy) {
    const colors = ['#ffcc00', '#ff8800', '#ffffff', '#ff4400', '#ffee66'];
    for (let i = 0; i < 14; i++) {
        const angle = (i / 14) * Math.PI * 2 + (Math.random() - 0.5) * 0.8;
        const speed = 1.5 + Math.random() * 4.5;
        particles.push({
            x: cx, y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1.5,
            life: 0, maxLife: 18 + Math.floor(Math.random() * 8),
            size: B * 0.9 + Math.random() * B * 1.2,
            color: colors[Math.floor(Math.random() * colors.length)]
        });
    }
}

function drawParticles() {
    particles = particles.filter(p => {
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.2;
        p.life++;
        const t = p.life / p.maxLife;
        ctx.globalAlpha = (1 - t) * 0.95;
        ctx.fillStyle = p.color;
        const sz = Math.max(1, p.size * (1 - t * 0.4));
        ctx.fillRect(p.x - sz * 0.5, p.y - sz * 0.5, sz, sz);
        return p.life < p.maxLife;
    });
    ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════
//  DRAW FRAME
// ═══════════════════════════════════════════════
function drawFrame() {
    if (!W) return;
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, W, H);

    drawBackground();

    // TW (enemy) with flash
    if (twFlashing) ctx.globalAlpha = 0.12;
    drawTW(twBase.x + twDx, twBase.y + twDy, twArmExtend);
    ctx.globalAlpha = 1;

    // SP (player) with flash
    if (spFlashing) ctx.globalAlpha = 0.12;
    drawSP(spBase.x + spDx, spBase.y + spDy, spArmExtend);
    ctx.globalAlpha = 1;

    drawParticles();

    // HP cards — pinned to opposite corners from each character
    const cardW = Math.floor(B * 22);
    const cardH = Math.floor(B * 7.5);
    drawHpCard(10, 10, 'enemy');                              // top-left (TW is top-right)
    drawHpCard(W - cardW - 10, H - cardH - 10, 'player');    // bottom-right (SP is bottom-left)
}

// ═══════════════════════════════════════════════
//  ATTACK ANIMATION
// ═══════════════════════════════════════════════
function easeOut(t) { return 1 - (1 - t) * (1 - t); }
function easeIn(t)  { return t * t; }

function animateAttack(attacker, onHit) {
    return new Promise(resolve => {
        let frame = 0, hitDone = false;
        const LUNGE = 14, PAUSE = 4, RETURN = 16, TOTAL = 34;
        const lungeMax = Math.floor(W * 0.26);

        function tick() {
            frame++;

            // Diagonal offset: SP angles up toward TW (upper-right), TW angles down toward SP
            const yFrac = 0.18; // vertical component as fraction of horizontal lunge

            if (frame <= LUNGE) {
                const t = easeOut(frame / LUNGE);
                if (attacker === 'player') {
                    spDx = t * lungeMax; spDy = -t * lungeMax * yFrac;
                    spArmExtend = frame / LUNGE;
                } else {
                    twDx = -t * lungeMax; twDy = t * lungeMax * yFrac;
                    twArmExtend = frame / LUNGE;
                }

            } else if (frame <= LUNGE + PAUSE) {
                if (!hitDone) {
                    hitDone = true;
                    onHit();
                    const hx = attacker === 'player'
                        ? twBase.x + twDx + B * 10
                        : spBase.x + spDx + B * 10;
                    const hy = (attacker === 'player' ? twBase.y + twDy : spBase.y + spDy) + B * 14;
                    spawnParticles(hx, hy);
                    if (attacker === 'player') twFlashing = true;
                    else                       spFlashing = true;
                }

            } else if (frame <= TOTAL) {
                const t = easeIn((frame - LUNGE - PAUSE) / RETURN);
                const rt = 1 - (frame - LUNGE - PAUSE) / RETURN;
                if (attacker === 'player') {
                    spDx = lungeMax * (1 - t); spDy = -lungeMax * yFrac * (1 - t);
                    spArmExtend = rt;
                    if (frame % 3 === 0) twFlashing = !twFlashing;
                } else {
                    twDx = -lungeMax * (1 - t); twDy = lungeMax * yFrac * (1 - t);
                    twArmExtend = rt;
                    if (frame % 3 === 0) spFlashing = !spFlashing;
                }

            } else {
                spDx = spDy = twDx = twDy = spArmExtend = twArmExtend = 0;
                spFlashing = twFlashing = false;
                particles = [];
                drawFrame();
                resolve();
                return;
            }

            drawFrame();
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
    });
}

// ═══════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════
function initGame() {
    playerHp = MAX_HP;
    enemyHp  = MAX_HP;
    busy = false;
    spDx = spDy = twDx = twDy = spArmExtend = twArmExtend = 0;
    spFlashing = twFlashing = false;
    particles = [];
    document.getElementById('resultOverlay').classList.remove('show');
    renderMoves();
    setText("What will<br>STAR PLATINUM do?");
    setMovesEnabled(true);
    drawFrame();
}

function setText(html) { document.getElementById('battleText').innerHTML = html; }

function renderMoves() {
    const menu = document.getElementById('moveMenu');
    menu.innerHTML = '';
    playerMoves.forEach((m, i) => {
        const btn = document.createElement('button');
        btn.className = 'move-btn';
        btn.innerHTML = m.name + '<span class="move-type">' + m.type + '</span>';
        btn.onclick = () => playerTurn(i);
        menu.appendChild(btn);
    });
}

function setMovesEnabled(on) {
    document.querySelectorAll('.move-btn').forEach(b => b.disabled = !on);
}

function rollDmg(m) {
    if (Math.random() > m.acc) return null;
    return Math.floor(Math.random() * (m.max - m.min + 1)) + m.min;
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function playerTurn(idx) {
    if (busy) return;
    busy = true;
    setMovesEnabled(false);

    const move = playerMoves[idx];

    if (move.heal > 0) {
        const got = Math.min(move.heal, MAX_HP - playerHp);
        playerHp = Math.min(MAX_HP, playerHp + move.heal);
        setText("STAR PLATINUM used<br><b>" + move.name + "</b>!<br>Restored " + got + " HP!");
        drawFrame();
        await wait(1000);
    } else {
        const dmg = rollDmg(move);
        if (dmg === null) {
            setText("STAR PLATINUM used<br><b>" + move.name + "</b>!<br>But it missed!");
            await wait(1000);
        } else {
            setText("STAR PLATINUM used<br><b>" + move.name + "</b>!");
            await wait(180);
            await animateAttack('player', () => { enemyHp = Math.max(0, enemyHp - dmg); });
            setText("STAR PLATINUM used<br><b>" + move.name + "</b>!<br>Dealt <b>" + dmg + "</b> damage!");
            await wait(950);
        }
    }

    if (enemyHp <= 0) { endGame(true); return; }
    await enemyTurn();
}

async function enemyTurn() {
    const hpR = enemyHp / MAX_HP;
    let wt = [30, 30, 10, 20];
    if (hpR < 0.30) wt[2] = 45;

    const total = wt.reduce((a,b) => a+b, 0);
    let rv = Math.random() * total, idx = 0;
    for (let i = 0; i < wt.length; i++) { rv -= wt[i]; if (rv <= 0) { idx = i; break; } }

    const move = enemyMoves[idx];
    setText("THE WORLD used<br><b>" + move.name + "</b>!");
    await wait(600);

    if (move.heal > 0) {
        const got = Math.min(move.heal, MAX_HP - enemyHp);
        enemyHp = Math.min(MAX_HP, enemyHp + move.heal);
        drawFrame();
        setText("THE WORLD used<br><b>" + move.name + "</b>!<br>DIO restored " + got + " HP!");
        await wait(1000);
    } else {
        const dmg = rollDmg(move);
        if (dmg === null) {
            setText("THE WORLD used<br><b>" + move.name + "</b>!<br>But it missed!");
            await wait(1000);
        } else {
            await animateAttack('enemy', () => { playerHp = Math.max(0, playerHp - dmg); });
            setText("THE WORLD used<br><b>" + move.name + "</b>!<br>Dealt <b>" + dmg + "</b> damage!");
            await wait(950);
        }
    }

    if (playerHp <= 0) { endGame(false); return; }
    setText("What will<br>STAR PLATINUM do?");
    setMovesEnabled(true);
    busy = false;
}

function endGame(playerWon) {
    const main = document.getElementById('resultMain');
    const sub  = document.getElementById('resultSub');
    if (playerWon) {
        main.textContent = "YARE YARE DAZE";
        main.style.color = '#f6e41f';
        sub.textContent  = "Star Platinum wins! DIO is defeated!";
    } else {
        main.textContent = "ZA WARUDO!";
        main.style.color = 'lightcoral';
        sub.textContent  = "Star Platinum fainted... Muda muda muda!";
    }
    document.getElementById('resultOverlay').classList.add('show');
}

// Wait for layout to settle, then init
requestAnimationFrame(() => {
    resizeCanvas();
    initGame();
});
</script>
