<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JoJo Wordle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #000; margin: 0; overflow-x: hidden; }

    @keyframes float-go {
      0%   { transform: translateY(110vh) rotate(-15deg); opacity: 0; }
      8%   { opacity: 0.7; }
      92%  { opacity: 0.5; }
      100% { transform: translateY(-120px) rotate(15deg); opacity: 0; }
    }
    @keyframes menacing-glow {
      0%, 100% { text-shadow: 0 0 8px #9333ea, 0 0 16px #7c3aed; color: #c084fc; }
      50%       { text-shadow: 0 0 20px #e879f9, 0 0 40px #c084fc, 0 0 70px #9333ea; color: #f0abfc; }
    }
    @keyframes symbol-glow {
      0%, 100% { filter: drop-shadow(0 0 18px #9333ea) drop-shadow(0 0 6px #7c3aed) brightness(0.9); }
      50%       { filter: drop-shadow(0 0 40px #c084fc) drop-shadow(0 0 14px #e879f9) brightness(1.15); }
    }
    @keyframes aura-pulse {
      0%, 100% { opacity: 0.18; transform: scale(1); }
      50%       { opacity: 0.38; transform: scale(1.04); }
    }
    @keyframes ora-float {
      0%   { transform: translate(0, 0) rotate(-8deg); opacity: 0; }
      15%  { opacity: 0.5; }
      85%  { opacity: 0.4; }
      100% { transform: translate(30px, -80px) rotate(8deg); opacity: 0; }
    }
    @keyframes muda-float {
      0%   { transform: translate(0, 0) rotate(6deg); opacity: 0; }
      15%  { opacity: 0.45; }
      85%  { opacity: 0.35; }
      100% { transform: translate(-25px, -90px) rotate(-6deg); opacity: 0; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes spin-slow {
      from { transform: rotate(15deg); }
      to   { transform: rotate(375deg); }
    }

    .go-symbol {
      animation: float-go linear infinite, menacing-glow 2s ease-in-out infinite;
      font-family: serif;
      font-weight: 900;
      user-select: none;
      pointer-events: none;
    }
    .symbol-glow { animation: symbol-glow 3.5s ease-in-out infinite; }
    .aura-ring   { animation: aura-pulse 2.5s ease-in-out infinite; }
    .ora-text    { animation: ora-float 5s ease-in-out infinite, menacing-glow 2s ease-in-out infinite; font-family: serif; font-weight: 900; user-select: none; pointer-events: none; }
    .muda-text   { animation: muda-float 6s ease-in-out infinite, menacing-glow 2s ease-in-out infinite; font-family: serif; font-weight: 900; user-select: none; pointer-events: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const WORDS = [
      "STAND", "ORAORA", "MUDA", "JOTARO", "ZAWARUDO",
      "JOESTAR", "POLNAREFF", "KAKYOIN", "SPEEDWAGON", "GIORNO",
      "REQUIEM", "HEAVEN",
    ];

    function getRandomWord() {
      return WORDS[Math.floor(Math.random() * WORDS.length)];
    }

    function getLetterColors(guess, target) {
      const colors = Array(guess.length).fill("bg-gray-500");
      const targetPool = target.split("");
      const guessPool  = guess.split("");
      guessPool.forEach((letter, i) => {
        if (letter === targetPool[i]) {
          colors[i] = "bg-green-500"; targetPool[i] = null; guessPool[i] = null;
        }
      });
      guessPool.forEach((letter, i) => {
        if (!letter) return;
        const j = targetPool.indexOf(letter);
        if (j !== -1) { colors[i] = "bg-yellow-500"; targetPool[j] = null; }
      });
      return colors;
    }

    /* ── JoJo Background ── */
    const SYM = "../assets/img/jojo symbol.png";

    // Large dramatic symbol placements: pos, rotation, size, opacity, animation delay
    const BIG_SYMBOLS = [
      { top:"-5%",   left:"-4%",  rotate:"-22deg", size:400, opacity:0.6,  delay:"0s"   },
      { top:"38%",   right:"-5%", rotate:"30deg",  size:360, opacity:0.5,  delay:"1.2s" },
      { bottom:"-4%",left:"28%",  rotate:"12deg",  size:320, opacity:0.45, delay:"2.1s" },
    ];

    function Background() {
      const goData = [
        { left:"4%",  dur:"9s",   delay:"0s",   size:"1.6rem" },
        { left:"12%", dur:"7s",   delay:"1.2s", size:"2.2rem" },
        { left:"21%", dur:"11s",  delay:"0.4s", size:"1.2rem" },
        { left:"30%", dur:"8s",   delay:"3.1s", size:"1.8rem" },
        { left:"40%", dur:"6s",   delay:"0.8s", size:"1rem"   },
        { left:"50%", dur:"10s",  delay:"2.5s", size:"2rem"   },
        { left:"58%", dur:"7.5s", delay:"1.7s", size:"1.4rem" },
        { left:"67%", dur:"9.5s", delay:"0.2s", size:"1.8rem" },
        { left:"76%", dur:"6.5s", delay:"4s",   size:"1.2rem" },
        { left:"85%", dur:"8.5s", delay:"1s",   size:"2.4rem" },
        { left:"92%", dur:"11s",  delay:"2.2s", size:"1rem"   },
        { left:"8%",  dur:"7.5s", delay:"5s",   size:"2rem"   },
        { left:"47%", dur:"9s",   delay:"3.8s", size:"1.6rem" },
        { left:"62%", dur:"6.8s", delay:"0.6s", size:"1.3rem" },
        { left:"80%", dur:"10s",  delay:"2.9s", size:"1.8rem" },
        { left:"35%", dur:"8.2s", delay:"4.5s", size:"2.2rem" },
      ];

      const oraData = [
        { left:"3%", top:"20%", delay:"0s",   dur:"5s"   },
        { left:"6%", top:"55%", delay:"2.3s", dur:"6s"   },
        { left:"9%", top:"75%", delay:"4.1s", dur:"5.5s" },
      ];
      const mudaData = [
        { right:"4%",  top:"25%", delay:"1s",   dur:"6s" },
        { right:"7%",  top:"60%", delay:"3.2s", dur:"5s" },
        { right:"10%", top:"80%", delay:"0.5s", dur:"7s" },
      ];

      return (
        <div style={{position:"fixed",inset:0,overflow:"hidden",pointerEvents:"none",zIndex:0}}>

          {/* Deep radial bg */}
          <div style={{
            position:"absolute", inset:0,
            background:"radial-gradient(ellipse 80% 80% at 50% 50%, #1a0533 0%, #0a0018 55%, #000 100%)",
          }}/>

          {/* Tiled wallpaper */}
          <div style={{
            position:"absolute", inset:"-20%", width:"140%", height:"140%",
            backgroundImage:`url('${SYM}')`,
            backgroundRepeat:"repeat",
            backgroundSize:"100px 100px",
            animation:"spin-slow 90s linear infinite",
            opacity:0.25,
            imageRendering:"pixelated",
          }}/>

          {/* Large dramatic symbols */}
          {BIG_SYMBOLS.map((s,i) => (
            <img key={i} src={SYM}
                 className="symbol-glow"
                 width={s.size} height={s.size}
                 style={{
                   position:"absolute",
                   top:s.top, left:s.left, right:s.right, bottom:s.bottom,
                   transform:`rotate(${s.rotate})`,
                   opacity:s.opacity,
                   imageRendering:"pixelated",
                   animationDelay:s.delay,
                 }}
            />
          ))}

          {/* Radial speed lines */}
          <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.07}}
               viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
            {Array.from({length:32},(_,i)=>{
              const a=(i/32)*Math.PI*2;
              return <line key={i} x1={400} y1={300}
                           x2={400+Math.cos(a)*1000} y2={300+Math.sin(a)*1000}
                           stroke="#9333ea" strokeWidth="1.5"/>;
            })}
            <circle cx="400" cy="300" r="80" fill="none" stroke="#7c3aed" strokeWidth="1" opacity="0.4"/>
          </svg>

          {/* Aura rings */}
          {[200,300,420].map((r,i)=>(
            <div key={i} className="aura-ring" style={{
              position:"absolute",
              left:"50%", top:"50%",
              width:r*2, height:r*2,
              marginLeft:-r, marginTop:-r,
              borderRadius:"50%",
              border:"1px solid #7c3aed",
              animationDelay:`${i*0.8}s`,
            }}/>
          ))}

          {/* Floating ゴ */}
          {goData.map((g,i)=>(
            <div key={i} className="go-symbol" style={{
              position:"absolute", left:g.left, bottom:"-60px",
              fontSize:g.size, animationDuration:g.dur, animationDelay:g.delay,
            }}>ゴ</div>
          ))}

          {/* ORA floating left */}
          {oraData.map((o,i)=>(
            <div key={i} className="ora-text" style={{
              position:"absolute", left:o.left, top:o.top,
              fontSize:"1.1rem", color:"#c084fc",
              animationDelay:o.delay, animationDuration:o.dur,
            }}>ORA</div>
          ))}

          {/* MUDA floating right */}
          {mudaData.map((m,i)=>(
            <div key={i} className="muda-text" style={{
              position:"absolute", right:m.right, top:m.top,
              fontSize:"1.1rem", color:"#c084fc",
              animationDelay:m.delay, animationDuration:m.dur,
            }}>MUDA</div>
          ))}
        </div>
      );
    }

    /* ── Main Game ── */
    function JoJoWordle() {
      const [target, setTarget]     = useState(() => getRandomWord());
      const [guesses, setGuesses]   = useState([]);
      const [current, setCurrent]   = useState("");
      const [gameOver, setGameOver] = useState(false);
      const [won, setWon]           = useState(false);

      const handleKey = (key) => {
        if (gameOver) return;
        if (key === "ENTER") {
          if (current.length !== target.length) return;
          const newGuesses = [...guesses, current];
          setGuesses(newGuesses);
          if (current === target) { setGameOver(true); setWon(true); }
          else if (newGuesses.length >= 6) { setGameOver(true); }
          setCurrent("");
        } else if (key === "BACK") {
          setCurrent(c => c.slice(0, -1));
        } else {
          setCurrent(c => c.length < target.length ? c + key : c);
        }
      };

      useEffect(() => {
        const onKeyDown = (e) => {
          const k = e.key.toUpperCase();
          if (k === "ENTER") handleKey("ENTER");
          else if (k === "BACKSPACE") handleKey("BACK");
          else if (/^[A-Z]$/.test(k)) handleKey(k);
        };
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
      }, [current, gameOver, guesses, target]);

      const letterColors = {};
      guesses.forEach(guess => {
        const colors = getLetterColors(guess, target);
        guess.split("").forEach((letter, i) => {
          const c = colors[i];
          if (c === "bg-green-500") letterColors[letter] = "bg-green-500";
          else if (c === "bg-yellow-500" && letterColors[letter] !== "bg-green-500") letterColors[letter] = "bg-yellow-500";
          else if (!letterColors[letter]) letterColors[letter] = "bg-gray-600";
        });
      });

      const renderRow = (word, isGuessed, i) => {
        const colors = isGuessed ? getLetterColors(word, target) : [];
        return (
          <div key={i} className="flex gap-2 justify-center">
            {Array.from({ length: target.length }).map((_, idx) => {
              const letter = word[idx] || "";
              const bg = isGuessed ? colors[idx] : "bg-gray-800";
              return (
                <div key={idx}
                  className={`w-10 h-10 flex items-center justify-center text-white font-bold text-lg border border-gray-600 ${bg}`}
                  style={isGuessed && colors[idx] === "bg-green-500" ? {boxShadow:"0 0 8px #22c55e"} :
                         isGuessed && colors[idx] === "bg-yellow-500" ? {boxShadow:"0 0 8px #eab308"} : {}}
                >
                  {letter}
                </div>
              );
            })}
          </div>
        );
      };

      const keyboard = [
        "QWERTYUIOP".split(""),
        "ASDFGHJKL".split(""),
        ["ENTER", ..."ZXCVBNM".split(""), "BACK"],
      ];

      const resetGame = () => {
        setTarget(getRandomWord()); setGuesses([]); setCurrent(""); setGameOver(false); setWon(false);
      };

      return (
        <>
          <Background />
          <div style={{position:"relative", zIndex:1}}
               className="min-h-screen text-white flex flex-col items-center justify-center gap-4 p-4">

            <a href="scratch.html"
               className="absolute top-4 left-4 px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded font-bold text-sm text-white">
              ← Home
            </a>

            <h1 className="text-3xl font-bold"
                style={{
                  background:"linear-gradient(90deg,#9333ea,#e879f9,#fbbf24,#9333ea)",
                  backgroundSize:"300% auto",
                  WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
                  animation:"shimmer 4s linear infinite",
                }}>
              JoJo Wordle
            </h1>
            <p className="text-purple-300 text-sm tracking-widest" style={{fontFamily:"serif"}}>
              ゴゴゴ — Guess the {target.length}-letter JoJo word — ゴゴゴ
            </p>

            <div className="flex flex-col gap-2"
                 style={{
                   background:"rgba(10,0,30,0.75)", padding:"16px", borderRadius:"12px",
                   boxShadow:"0 0 30px #7c3aed44, 0 0 60px #4c1d9522",
                   border:"1px solid #4c1d95",
                 }}>
              {Array.from({ length: 6 }).map((_, i) => {
                if (i < guesses.length) return renderRow(guesses[i], true, i);
                if (i === guesses.length) return renderRow(current, false, i);
                return renderRow("", false, i);
              })}
            </div>

            {gameOver && (
              <div className="text-center mt-2"
                   style={{
                     background:"rgba(10,0,30,0.9)", padding:"16px 24px", borderRadius:"12px",
                     border:"1px solid #7c3aed", boxShadow:"0 0 24px #9333ea66",
                   }}>
                {won
                  ? <p className="text-green-400 font-bold text-lg" style={{textShadow:"0 0 12px #22c55e"}}>
                      YARE YARE DAZE! You got it!
                    </p>
                  : <p className="text-red-400 font-bold text-lg">
                      The word was: <span className="text-white">{target}</span>
                    </p>
                }
                <button className="mt-3 px-4 py-2 rounded font-bold text-white"
                        style={{background:"#6d28d9", boxShadow:"0 0 12px #7c3aed"}}
                        onClick={resetGame}>
                  Play Again
                </button>
              </div>
            )}

            <div className="flex flex-col gap-1 items-center mt-2"
                 style={{
                   background:"rgba(10,0,30,0.75)", padding:"12px", borderRadius:"12px",
                   border:"1px solid #3b1a6e",
                 }}>
              {keyboard.map((row, ri) => (
                <div key={ri} className="flex gap-1">
                  {row.map(k => (
                    <button key={k} onClick={() => handleKey(k)}
                            className={`px-2 py-3 rounded text-sm font-bold min-w-[32px] ${
                              k === "ENTER" || k === "BACK" ? "px-3" : letterColors[k] || ""
                            }`}
                            style={
                              k === "ENTER" || k === "BACK"
                                ? { background:"#4c1d95", color:"#e9d5ff" }
                                : letterColors[k]
                                  ? {}
                                  : { background:"#1e1035", color:"#c4b5fd", border:"1px solid #3b1a6e" }
                            }>
                      {k === "BACK" ? "⌫" : k}
                    </button>
                  ))}
                </div>
              ))}
            </div>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<JoJoWordle />);
  </script>
</body>
</html>
